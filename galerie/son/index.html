    document.querySelectorAll('.lyrics-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.getAttribute('data-lyrics');
            const data = lyricsData[key];
            if (!data) return;
            document.getElementById('lyrics-title').textContent = data.title;
            document.getElementById('lyrics-content').innerHTML = data.html || '';
            document.getElementById('lyrics-modal').style.display = 'flex';
        });
    });

    document.getElementById('lyrics-close').addEventListener('click', () => {
        document.getElementById('lyrics-modal').style.display = 'none';
    });

    document.getElementById('lyrics-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('lyrics-modal')) {
            document.getElementById('lyrics-modal').style.display = 'none';
        }
    });
