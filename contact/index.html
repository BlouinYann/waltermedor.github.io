<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Walter Medor</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../scripts.js" defer></script>
    <style>
        /* --- PAGE CONTACT --- */
        .contact-section {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .contact-intro {
            font-family: var(--font-subtitle);
            font-size: 1.1rem;
            color: var(--color-secondary);
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: 1px;
            text-transform: lowercase;
            border-bottom: 1px solid var(--color-primary);
            padding-bottom: 30px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 70px;
        }

        .contact-card {
            background: rgba(99, 81, 67, 0.08);
            border: 1px solid var(--color-primary);
            padding: 35px 25px;
            text-align: center;
            position: relative;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .contact-card:hover {
            background: rgba(99, 81, 67, 0.18);
            transform: translateY(-3px);
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            width: 60%;
            height: 2px;
            background: var(--color-secondary);
        }

        .contact-card-label {
            font-family: var(--font-subtitle);
            font-size: 0.85rem;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 18px;
            display: block;
        }

        .contact-card-icon {
            font-size: 2rem;
            margin-bottom: 15px;
            display: block;
            filter: sepia(1) saturate(0.5);
        }

        .contact-card a {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--color-white);
            text-decoration: none;
            display: block;
            letter-spacing: 1px;
            transition: color 0.2s ease;
            word-break: break-all;
        }

        .contact-card a:hover {
            color: var(--color-secondary);
        }

        /* Formulaire */
        .contact-form-title {
            font-family: var(--font-title);
            color: var(--color-primary);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 35px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-family: var(--font-subtitle);
            font-size: 0.85rem;
            color: var(--color-secondary);
            text-transform: lowercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--color-primary);
            border-top: none;
            border-left: none;
            border-right: none;
            border-bottom: 2px solid var(--color-primary);
            color: var(--color-white);
            font-family: var(--font-body);
            font-size: 1.1rem;
            padding: 12px 5px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s ease, background 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-bottom-color: var(--color-secondary);
            background: rgba(99, 81, 67, 0.08);
        }

        .form-group select option {
            background: #1a1a1a;
            color: var(--color-white);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 130px;
            border: 1px solid var(--color-primary);
        }

        .form-group textarea:focus {
            border-color: var(--color-secondary);
        }

        .form-submit {
            width: 100%;
            background: var(--color-primary);
            color: #000;
            border: none;
            font-family: var(--font-title);
            font-size: 1.4rem;
            letter-spacing: 3px;
            padding: 18px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .form-submit:hover {
            background: var(--color-secondary);
        }

        .form-submit:active {
            transform: scale(0.98);
        }

        .form-note {
            font-family: var(--font-subtitle);
            font-size: 0.8rem;
            color: rgba(230, 226, 223, 0.4);
            text-align: center;
            margin-top: 20px;
            font-style: italic;
        }

        /* Message de confirmation */
        .confirm-msg {
            display: none;
            text-align: center;
            padding: 30px;
            border: 1px solid var(--color-primary);
            background: rgba(99, 81, 67, 0.1);
            margin-top: 20px;
        }

        .confirm-msg p {
            font-family: var(--font-subtitle);
            color: var(--color-secondary);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .contact-card a {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <header id="main-header"></header>

    <main>
        <section class="contact-section">
            <h2>Contact</h2>

            <p class="contact-intro">
                pour les concerts, les délires, les insultes constructives et les demandes en mariage
            </p>

            <!-- Coordonnées directes -->
            <div class="contact-grid">
                <div class="contact-card">
                    <span class="contact-card-icon">✉</span>
                    <span class="contact-card-label">Email</span>
                    <a href="mailto:krostof@neuf.fr">krostof@neuf.fr</a>
                </div>
                <div class="contact-card">
                    <span class="contact-card-icon">☎</span>
                    <span class="contact-card-label">Téléphone</span>
                    <a href="tel:+33630518010">06 30 51 80 10</a>
                </div>
            </div>

            <!-- Formulaire -->
            <p class="contact-form-title">— ou écris-nous —</p>

            <div id="contact-form-wrap">
                <div class="form-group">
                    <label for="contact-nom">ton nom</label>
                    <input type="text" id="contact-nom" placeholder="Walter Médor">
                </div>
                <div class="form-group">
                    <label for="contact-email">ton email</label>
                    <input type="email" id="contact-email" placeholder="chien@niche.fr">
                </div>
                <div class="form-group">
                    <label for="contact-sujet">c'est pour</label>
                    <select id="contact-sujet">
                        <option value="">— choisir —</option>
                        <option value="booking">Booking / Concert</option>
                        <option value="presse">Presse / Interview</option>
                        <option value="collab">Collaboration</option>
                        <option value="autre">Autre chose</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="contact-msg">ton message</label>
                    <textarea id="contact-msg" placeholder="Dis-nous tout..."></textarea>
                </div>
                <button class="form-submit" onclick="envoyerContact()">Envoyer ↗</button>
                <p class="form-note">on répond toujours, même quand on est en tournée.</p>
            </div>

            <div class="confirm-msg" id="confirm-msg">
                <p>✓ Message reçu. On revient vers toi dès qu'on émerge.</p>
            </div>

        </section>
    </main>

    <footer id="main-footer"></footer>

    <script>
        function envoyerContact() {
            const nom = document.getElementById('contact-nom').value.trim();
            const email = document.getElementById('contact-email').value.trim();
            const sujet = document.getElementById('contact-sujet').value;
            const msg = document.getElementById('contact-msg').value.trim();

            if (!nom || !email || !msg) {
                alert('Remplis au moins ton nom, ton email et ton message.');
                return;
            }

            // Ouvre le client mail avec les infos pré-remplies
            const sujetMail = sujet ? `[Walter Medor - ${sujet}] Message de ${nom}` : `[Walter Medor] Message de ${nom}`;
            const corps = `Nom : ${nom}\nEmail : ${email}\n\n${msg}`;
            const mailtoLink = `mailto:krostof@neuf.fr?subject=${encodeURIComponent(sujetMail)}&body=${encodeURIComponent(corps)}`;

            window.location.href = mailtoLink;

            // Affiche le message de confirmation
            document.getElementById('contact-form-wrap').style.opacity = '0.3';
            document.getElementById('confirm-msg').style.display = 'block';
        }
    </script>

</body>

</html>
