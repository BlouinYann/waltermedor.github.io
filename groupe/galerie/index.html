<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidéos | Walter Medor</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/scripts.js" defer></script>
</head>
<body>

    <header id="main-header"></header>

    <main class="video-page-container">
        <div class="content-header">
            <h2 class="section-title">Vidéos</h2>
            <p class="tagline">Images brutes & Live Sessions</p>
        </div>

        <div class="video-grid">
            <article class="video-item">
                <div class="video-frame">
                    <div class="video-wrapper">
                        <iframe 
                            src="https://www.youtube.com/embed/Lu_u6vSnRx8" 
                            title="Walter Medor - Teaser 2024"
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
                <div class="video-meta">
                    <h3>Walter Medor</h3>
                    <span class="video-category">Teaser 2024</span>
                </div>
            </article>

            <article class="video-item">
                <div class="video-frame">
                    <div class="video-wrapper">
                        <iframe 
                            src="https://www.youtube.com/embed/tnRJMZdUNsQ" 
                            title="Walter Medor - Live"
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
                <div class="video-meta">
                    <h3>Walter Medor</h3>
                    <span class="video-category">Le Concert au Jardin de Verre</span>
                </div>
            </article>
        </div>
    </main>

    <footer id="main-footer"></footer>

</body>
</html>
